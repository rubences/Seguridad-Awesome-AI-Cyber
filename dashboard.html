<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awesome-AI-Cyber | Offensive Intelligence Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --glass-bg: rgba(20, 20, 20, 0.7);
            --accent-red: #ff3e3e;
            --accent-glow: rgba(255, 62, 62, 0.3);
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 62, 62, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 62, 62, 0.05) 0%, transparent 40%);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--accent-red);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .status-badge {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background-color: var(--accent-red);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 62, 62, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(255, 62, 62, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 62, 62, 0); }
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 1.5rem;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .card-header {
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .terminal {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            padding: 1rem;
            height: 400px;
            overflow-y: auto;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .log-entry {
            margin-bottom: 0.5rem;
        }

        .log-time { color: #666; margin-right: 10px; }
        .log-tag { color: var(--accent-red); margin-right: 10px; font-weight: bold; }
        .log-msg { color: #ccc; }

        .vulnerability-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .vuln-item {
            padding: 1rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-left: 4px solid var(--accent-red);
            transition: transform 0.2s;
        }

        .vuln-item:hover {
            transform: translateX(5px);
            background: rgba(255, 255, 255, 0.05);
        }

        .vuln-severity {
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
            text-transform: uppercase;
        }

        .vuln-name {
            font-size: 1rem;
            font-weight: 600;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-box {
            text-align: center;
            padding: 1rem;
            background: var(--glass-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-red);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">AWESOME-AI-CYBER</div>
            <div class="status-badge">
                <div class="pulse"></div>
                ORCHESTRATOR ACTIVE
            </div>
        </header>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-value">152</div>
                <div class="stat-label">MCP TOOLS</div>
            </div>
            <div class="stat-box">
                <div class="stat-value">1</div>
                <div class="stat-label">KNOWLEDGE BASE (RAG)</div>
            </div>
            <div class="stat-box">
                <div class="stat-value">PRO</div>
                <div class="stat-label">AGENT MODE</div>
            </div>
        </div>

        <div class="grid">
            <div class="main-col">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">Live Intelligence Feed</div>
                        <div style="font-size: 0.8rem; color: #666;">target: <span id="target-name">waiting...</span></div>
                    </div>
                    <div class="terminal" id="terminal">
                        <div class="log-entry">
                            <span class="log-time">19:30:00</span>
                            <span class="log-tag">[SYSTEM]</span>
                            <span class="log-msg">Awesome-AI-Cyber Orchestrator initialized. Waiting for target input...</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="side-col">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">Vulnerabilities</div>
                    </div>
                    <div class="vulnerability-list" id="vuln-list">
                        <div style="color: #666; font-size: 0.9rem; text-align: center; padding: 1rem;">No findings yet.</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function addLog(tag, msg) {
            const terminal = document.getElementById('terminal');
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-time">${time}</span><span class="log-tag">[${tag}]</span><span class="log-msg">${msg}</span>`;
            terminal.appendChild(entry);
            terminal.scrollTop = terminal.scrollHeight;
        }

        // Simulate some logs for now
        setTimeout(() => addLog('AI', 'Reasoning about target infrastructure...'), 1000);
        setTimeout(() => addLog('MCP', 'Initiating Nmap scan -sV -sC...'), 2500);
    </script>
</body>
</html>
